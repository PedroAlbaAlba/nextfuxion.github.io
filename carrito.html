<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Carrito - NextFuXion

</title>

<link rel="stylesheet"
href="styles.css">

</head>

<body>

<header class="hero">

<img
src="assets/logo-horizontal.png"
class="logo"
alt="NextFuXion">

<h2>

Mi Carrito

</h2>

</header>

<section class="catalog">

<div id="carritoProductos">

</div>

<h2 id="totalCarrito">

Total: $0

</h2>

<hr>

<h2>

<button
class="btn-view"
onclick="vaciarCarrito()">

🗑 Vaciar carrito

</button>

Datos del cliente

</h2>

<form id="formCliente">

<input
type="text"
id="nombre"
placeholder="Nombre completo"
required>

<input
type="text"
id="telefono"
placeholder="Teléfono"
required>

<input
type="email"
id="correo"
placeholder="Correo">

<input
type="text"
id="ciudad"
placeholder="Ciudad">

<input
type="text"
id="direccion"
placeholder="Dirección de entrega">

<textarea
id="observaciones"
placeholder="Observaciones"></textarea>

<br><br>

<button
type="button"
class="btn-buy"
onclick="enviarPedido()">

Finalizar Pedido

</button>

</form>

</section>

<script src="carrito.js"></script>

</body>

</html>
