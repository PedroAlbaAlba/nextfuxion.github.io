name: Update Products

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: node scripts/update.js

      - name: Commit changes
        run: |
          git config user.name "NextFuXion Bot"
          git config user.email "bot@nextfuxion.local"

          git add productos.json

          git commit -m "Actualizar productos" || echo "Sin cambios"

          git push
