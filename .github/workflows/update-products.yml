name: Update Products

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:

  update:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Run extractor
        run: node scripts/update.js

      - name: Commit changes
        run: |

          git config user.name "NextFuXion Bot"
          git config user.email "bot@nextfuxion.local"

          git add productos.json

          git commit -m "Actualizacion automatica" || echo "Sin cambios"

          git push
