<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Preparando producto...</title>
</head>

<body>

<p>Cargando producto...</p>

<script>

async function iniciar(){

const params =
new URLSearchParams(
window.location.search
);

const producto =
decodeURIComponent(
params.get(
"url"
)
);

try{

/* obtener catálogo */

const pagina =
await fetch(
"https://ifuxion.com/giovannaastridrangelfarfan/enrollment/products",
{
credentials:"include"
}
);

const html =
await pagina.text();

/* extraer token */

const match =
html.match(
/name="__RequestVerificationToken".*?value="([^"]+)"/
);

if(match){

const token =
match[1];

await fetch(
"https://ifuxion.com/giovannaastridrangelfarfan/enrollment/enrollmentconfigurationlittle",
{
method:"POST",

credentials:"include",

headers:{
"Content-Type":
"application/json;charset=utf-8",

"__RequestVerificationToken":
token
},

body:
JSON.stringify({
country:"CO"
})

}
);

}

/* abrir producto */

window.location =
producto;

}catch(e){

console.log(
e
);

/* abrir igual */

window.location =
producto;

}

}

iniciar();

</script>

</body>

</html>
