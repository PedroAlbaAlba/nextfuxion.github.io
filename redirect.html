<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>
Cargando producto
</title>

</head>

<body>

<p>
Preparando catálogo FuXion...
</p>

<script>

const params =
new URLSearchParams(
window.location.search
);

const link =
decodeURIComponent(
params.get(
"url"
)
);

/* paso 1:
entrar al catálogo */

window.location.replace(
"https://ifuxion.com/giovannaastridrangelfarfan/enrollment/products"
);

/* paso 2:
guardar producto */

sessionStorage.setItem(
"nextfuxion_producto",
link
);

</script>

</body>

</html>
