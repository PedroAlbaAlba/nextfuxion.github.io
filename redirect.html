<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Configurando Colombia...</title>
</head>

<body>

<p>Preparando producto...</p>

<form id="frm"
action="https://ifuxion.com/giovannaastridrangelfarfan/enrollment/enrollmentconfigurationlittle"
method="POST"
target="fuxionFrame">

<input
type="hidden"
name="country"
value="CO">

</form>

<iframe
name="fuxionFrame"
style="display:none">
</iframe>

<script>

const params =
new URLSearchParams(
window.location.search
);

const producto =
decodeURIComponent(
params.get(
"url"
)
);

/* ejecutar cambio país */

document
.getElementById(
"frm"
)
.submit();

/* esperar */

setTimeout(()=>{

window.location =
producto;

},3000);

</script>

</body>
</html>
