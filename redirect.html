<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>
Redirigiendo...
</title>

</head>

<body>

<p>
Abriendo producto...
</p>

<script>

const params =
new URLSearchParams(
window.location.search
);

/* obtenemos el link completo */

const link =
params.get(
"url"
);

if(
link
){

/* ir directamente al producto */

window.location =
decodeURIComponent(
link
);

}else{

document.body.innerHTML =
"<h2>No se recibió producto</h2>";

}

</script>

</body>

</html>
