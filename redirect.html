<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Preparando producto...</title>
</head>

<body>

<p>Cargando configuración Colombia...</p>

<script>

const params =
new URLSearchParams(
window.location.search
);

const producto =
decodeURIComponent(
params.get(
"url"
)
);

/* guardar producto */

sessionStorage.setItem(
"nextfuxion_producto",
producto
);

/* abrir primero catálogo */

window.location =
"https://ifuxion.com/giovannaastridrangelfarfan/enrollment/products";

setTimeout(async()=>{

try{

/* obtener token */

const pagina =
await fetch(
"https://ifuxion.com/giovannaastridrangelfarfan/enrollment/products",
{
credentials:"include"
}
);

const html =
await pagina.text();

/* buscar token */

const match =
html.match(
/name="__RequestVerificationToken".*?value="([^"]+)"/
);

if(match){

const token =
match[1];

await fetch(
"https://ifuxion.com/giovannaastridrangelfarfan/enrollment/enrollmentconfigurationlittle",
{
method:"POST",

credentials:"include",

headers:{
"Content-Type":
"application/json;charset=utf-8",

"__RequestVerificationToken":
token
},

body:
JSON.stringify({
country:"login"
})

}
);

window.location =
producto;

}

}catch(e){

console.log(e);

window.location =
producto;

}

},2000);

</script>

</body>

</html>
